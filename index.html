<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Unclearable Cookie</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      html {
        visibility: hidden;
      }

      html.fonts-loaded {
        visibility: visible;
      }

      body {
        margin: 0;
        min-height: 100vh;

        display: flex;
        align-items: center;
        justify-content: center;

        font-family: 'Inter', sans-serif;

        background: radial-gradient(
          circle at top,
          #222 0%,
          #111 45%,
          #090909 100%
        );

        color: white;
      }

      .card {
        width: 90%;
        max-width: 720px;

        background: rgba(18, 18, 18, 0.92);

        border: 1px solid rgba(255, 255, 255, 0.08);

        border-radius: 28px;

        padding: 36px;

        backdrop-filter: blur(14px);

        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      h1 {
        margin: 0 0 24px;

        text-align: center;

        font-size: 42px;
        font-weight: 700;

        color: white;

        letter-spacing: -2px;
      }

      h2 {
        margin: 0 0 24px;

        text-align: center;

        color: white;

        letter-spacing: -2px;
      }

      pre {
        margin: 0;

        background: #0b0b0b;

        border: 1px solid rgba(255, 255, 255, 0.06);

        border-radius: 20px;

        padding: 22px;

        overflow-x: auto;

        color: white;

        font-size: 15px;
        line-height: 1.7;

        font-family: 'Inter', sans-serif;

        font-weight: 500;
      }

      .github-link {
        display: flex;
        justify-content: center;

        margin-top: 22px;
      }

      .github-link a {
        display: inline-flex;
        align-items: center;
        gap: 10px;

        padding: 10px 16px;

        border-radius: 14px;

        background: rgba(255, 255, 255, 0.04);

        border: 1px solid rgba(255, 255, 255, 0.06);

        color: #d8d8d8;

        text-decoration: none;

        font-size: 14px;
        font-weight: 500;

        transition: all 0.2s ease;
      }

      .github-link a:hover {
        background: rgba(255, 255, 255, 0.08);

        border-color: rgba(255, 255, 255, 0.12);

        transform: translateY(-1px);

        color: white;
      }

      .github-link svg {
        width: 18px;
        height: 18px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Unclearable Cookie</h2>
      <h1 id="title"></h1>

      <div class="github-link">
        <a
          href="https://github.com/sudo-iudo/unclearable-cookie"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M12 .5C5.648.5.5 5.648.5 12a11.5 11.5 0 0 0 7.863 10.917c.575.105.787-.25.787-.556 0-.274-.01-1-.016-1.962-3.2.696-3.877-1.543-3.877-1.543-.523-1.33-1.278-1.684-1.278-1.684-1.045-.714.08-.7.08-.7 1.155.08 1.763 1.186 1.763 1.186 1.026 1.758 2.693 1.25 3.35.955.103-.743.402-1.25.73-1.538-2.554-.29-5.238-1.277-5.238-5.684 0-1.256.45-2.283 1.186-3.088-.12-.29-.514-1.46.112-3.043 0 0 .967-.31 3.17 1.18a10.95 10.95 0 0 1 5.77 0c2.2-1.49 3.166-1.18 3.166-1.18.628 1.583.234 2.753.115 3.043.738.805 1.184 1.832 1.184 3.088 0 4.418-2.688 5.39-5.25 5.675.413.355.78 1.055.78 2.126 0 1.536-.014 2.775-.014 3.152 0 .31.208.667.793.554A11.503 11.503 0 0 0 23.5 12C23.5 5.648 18.352.5 12 .5Z"
            />
          </svg>

          GitHub
        </a>
      </div>
    </div>

    <script>
      document.fonts.ready.then(() => {
        document.documentElement.classList.add('fonts-loaded');
      });

      const output = document.getElementById('output');
      const title = document.getElementById('title');

      const identifier =
        document.cookie.split('unique-id=')[1]?.split(';')[0] ||
        crypto.randomUUID().split('-').at(-1);

      function update() {
        document.cookie = `unique-id=${identifier}; path=/; SameSite=Lax`;

        title.textContent = identifier;
      }

      update();

      setInterval(update, 1);
    </script>
  </body>
</html>
