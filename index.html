<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Unclearable Cookie</title>

    <!-- preload шрифта -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      html {
        visibility: hidden;
      }

      html.fonts-loaded {
        visibility: visible;
      }

      body {
        margin: 0;
        min-height: 100vh;

        display: flex;
        align-items: center;
        justify-content: center;

        font-family: 'Inter', sans-serif;

        background: radial-gradient(
          circle at top,
          #222 0%,
          #111 45%,
          #090909 100%
        );

        color: #d8d8d8;
      }

      .card {
        width: 90%;
        max-width: 720px;

        background: rgba(18, 18, 18, 0.92);

        border: 1px solid rgba(255, 255, 255, 0.08);

        border-radius: 28px;

        padding: 36px;

        backdrop-filter: blur(14px);

        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      h1 {
        margin: 0 0 24px;

        text-align: center;

        font-size: 34px;
        font-weight: 700;

        color: white;

        letter-spacing: -1px;
      }

      pre {
        margin: 0;

        background: #0b0b0b;

        border: 1px solid rgba(255, 255, 255, 0.06);

        border-radius: 20px;

        padding: 22px;

        overflow-x: auto;

        color: #bfbfbf;

        font-size: 15px;
        line-height: 1.7;

        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Unclearable Cookie</h1>

      <pre id="output"></pre>
    </div>

    <script>
      document.fonts.ready.then(() => {
        document.documentElement.classList.add('fonts-loaded');
      });

      const output = document.getElementById('output');

      const identifier =
        document.cookie.split('uuid=')[1]?.split(';')[0] || crypto.randomUUID();

      function update() {
        document.cookie = `uuid=${identifier}; path=/; SameSite=Lax`;

        output.textContent = `Current UUID:

${identifier}

Cookie:

${document.cookie}`;
      }

      update();

      setInterval(update, 1);
    </script>
  </body>
</html>
